  #     - server
  #   environment:
  #     NUXT_PUBLIC_API_BASE: http://localhost:3000/api/v1
  #   ports:
  #     - "3001:3000"
  #   volumes:
  #     - ./client:/app
  #     - /app/node_modules

volumes:
  mysql_data:
  redis_data:
