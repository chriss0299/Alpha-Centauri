services:
  mysql-test:
    image: mysql:8.0
    container_name: rugbytracker-mysql-test
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: rugbytracker_test
      MYSQL_USER: rugbyuser
      MYSQL_PASSWORD: rugbypass
    ports:
      - "3309:3306"
    volumes:
      - ./database/migrations/001_create_users_table.sql:/docker-entrypoint-initdb.d/01_001_users.sql:ro
      - ./database/migrations/002_create_refresh_tokens_table.sql:/docker-entrypoint-initdb.d/01_002_refresh_tokens.sql:ro
      - ./database/migrations/003_add_google_id_to_users.sql:/docker-entrypoint-initdb.d/01_003_google_id.sql:ro
      - ./database/migrations/004_password_hash_nullable.sql:/docker-entrypoint-initdb.d/01_004_password_nullable.sql:ro
      - ./database/seeds/test/001_e2e_users.sql:/docker-entrypoint-initdb.d/02_001_e2e_users.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  redis-test:
    image: redis:7-alpine
    container_name: rugbytracker-redis-test
    ports:
      - "6380:6379"

  server-test:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: rugbytracker-server-test
    depends_on:
      mysql-test:
        condition: service_healthy
      redis-test:
        condition: service_started
    environment:
      NODE_ENV: test
      PORT: 3000
      DB_HOST: mysql-test
      DB_PORT: 3306
      DB_NAME: rugbytracker_test
      DB_USER: rugbyuser
      DB_PASSWORD: rugbypass
      REDIS_URL: redis://redis-test:6379
      JWT_SECRET: e2e-test-secret-not-sensitive-localhost-only
      GOOGLE_CLIENT_ID: ""
      ALLOWED_ORIGINS: "http://localhost:3003"
    ports:
      - "3002:3000"

  client-test:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: rugbytracker-client-test
    depends_on:
      - server-test
    environment:
      NUXT_PUBLIC_API_BASE: http://localhost:3002/api/v1
      NUXT_PUBLIC_GOOGLE_CLIENT_ID: ""
    ports:
      - "3003:3001"
